              value: tcp-lb-gateway=tcp-lb-gateway:8080,tcp-backend-worker1=tcp-backend-worker1:8080,tcp-backend-worker2=tcp-backend-worker2:8080
        - name: release-status
          image: redis:7.4-alpine
          imagePullPolicy: IfNotPresent
          env:
            - {name: RELEASE_COLOR, value: green}
            - {name: RELEASE_VERSION, value: v2}
          command:
            - /bin/sh
