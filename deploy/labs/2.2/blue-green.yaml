---
apiVersion: v1
kind: Service
metadata:
  name: pod-state-manager-active
  namespace: tcp-lb-mini
spec:
  selector: {app: pod-state-manager-bg, slot: blue}
  ports:
    - {name: status, port: 8080, targetPort: status}
