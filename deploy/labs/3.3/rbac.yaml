apiVersion: v1
kind: ServiceAccount
metadata:
  name: pod-state-manager
  namespace: tcp-lb-mini
  labels:
    lab: "3.3"
automountServiceAccountToken: true
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pod-state-manager-pod-reader
  namespace: tcp-lb-mini
  labels:
    lab: "3.3"
rules:
  - apiGroups:
      - ""
    resources:
      - pods
    verbs:
      - list
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pod-state-manager-pod-reader
  namespace: tcp-lb-mini
  labels:
    lab: "3.3"
subjects:
  - kind: ServiceAccount
    name: pod-state-manager
    namespace: tcp-lb-mini
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: pod-state-manager-pod-reader
