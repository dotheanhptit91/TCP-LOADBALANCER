spec:
  template:
    metadata:
      labels:
        lab.tcp-lb/rbac: "3.3"
    spec:
      serviceAccountName: pod-state-manager
      automountServiceAccountToken: true
      containers:
        - name: rbac-api-checker
          image: curlimages/curl:8.12.1
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
          args:
            - |
              token_file=/var/run/secrets/kubernetes.io/serviceaccount/token
              ca_file=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt
              api="https://${KUBERNETES_SERVICE_HOST}:${KUBERNETES_SERVICE_PORT_HTTPS}/api/v1/namespaces/${POD_NAMESPACE}/pods"

              while true; do
                response="$(curl --fail --silent --show-error \
                  --cacert "$ca_file" \
                  -H "Authorization: Bearer $(cat "$token_file")" \
                  "$api")"
                pod_names="$(printf '%s\n' "$response" | \
                  sed -n '/"metadata": {/{n;s/.*"name": "\([^"]*\)".*/\1/p;}' | \
                  tr '\n' ' ')"
                printf 'Kubernetes API pod list succeeded namespace=%s pods=%s\n' \
                  "$POD_NAMESPACE" "$pod_names"
                sleep 30
              done
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -ec
                - |
                  token_file=/var/run/secrets/kubernetes.io/serviceaccount/token
                  ca_file=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt
                  api="https://${KUBERNETES_SERVICE_HOST}:${KUBERNETES_SERVICE_PORT_HTTPS}/api/v1/namespaces/${POD_NAMESPACE}/pods"
                  curl --fail --silent --output /dev/null \
                    --cacert "$ca_file" \
                    -H "Authorization: Bearer $(cat "$token_file")" \
                    "$api"
            periodSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 5m
              memory: 8Mi
            limits:
              cpu: 50m
              memory: 32Mi
