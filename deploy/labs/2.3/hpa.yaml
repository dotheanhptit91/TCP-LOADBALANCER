apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: pod-state-manager-hpa
  namespace: tcp-lb-mini
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: pod-state-manager-hpa
  minReplicas: 2
  maxReplicas: 10
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 30
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
