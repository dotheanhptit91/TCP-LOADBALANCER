apiVersion: v1
kind: Pod
metadata:
  name: pod-state-manager-quota-rejected
  namespace: tcp-lb-mini
  labels:
    app: pod-state-manager-quota-rejected
    lab: "3.4"
spec:
  serviceAccountName: pod-state-manager
  restartPolicy: Never
  securityContext:
    runAsNonRoot: true
    runAsUser: 10001
    runAsGroup: 10001
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: manager
      image: tcp-lb-mini/pod-state-manager:v2
      imagePullPolicy: Never
      command:
        - /bin/sh
        - -ec
        - exec sleep 3600
      resources:
        requests:
          cpu: "5"
          memory: 32Mi
        limits:
          cpu: "5"
          memory: 64Mi
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop:
            - ALL
