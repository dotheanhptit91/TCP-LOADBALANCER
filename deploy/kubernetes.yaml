apiVersion: v1
kind: Namespace
metadata:
  name: tcp-loadbalacer
---
# Multus NetworkAttachmentDefinitions. This demo pins all data-plane Pods to
# one labeled node because a bridge network is node-local.
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: worker1-net
  namespace: tcp-loadbalacer
spec:
  config: |-
    {
      "cniVersion": "0.3.1",
      "type": "bridge",
      "bridge": "br-tcp-worker1",
      "capabilities": {"ips": true},
      "ipam": {
        "type": "host-local",
        "subnet": "10.10.0.0/24",
        "rangeStart": "10.10.0.2",
        "rangeEnd": "10.10.0.254"
      }
    }
---
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: worker2-net
  namespace: tcp-loadbalacer
spec:
  config: |-
    {
      "cniVersion": "0.3.1",
      "type": "bridge",
      "bridge": "br-tcp-worker2",
      "capabilities": {"ips": true},
      "ipam": {
        "type": "host-local",
        "subnet": "10.20.0.0/24",
        "rangeStart": "10.20.0.2",
        "rangeEnd": "10.20.0.254"
      }
    }
---
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: server-net
  namespace: tcp-loadbalacer
spec:
  config: |-
    {
      "cniVersion": "0.3.1",
      "type": "bridge",
      "bridge": "br-tcp-server",
      "capabilities": {"ips": true},
      "ipam": {
        "type": "host-local",
        "subnet": "10.30.0.0/24",
        "rangeStart": "10.30.0.2",
        "rangeEnd": "10.30.0.254"
      }
    }
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: kind-secondary-network-setup
  namespace: tcp-loadbalacer
spec:
  selector:
    matchLabels: {app: kind-secondary-network-setup}
  template:
    metadata:
      labels: {app: kind-secondary-network-setup}
    spec:
      hostNetwork: true
      nodeSelector: {tcp-lb-role: dataplane}
      containers:
        - name: configure-node-nat
          image: tcp-loadbalacer/tcp-lb-gateway:latest
          imagePullPolicy: Never
          command:
            - /bin/sh
            - -ec
            - |
              while true; do
                for cidr in 10.10.0.0/24 10.20.0.0/24 10.30.0.0/24; do
                  nft list chain ip nat KIND-MASQ-AGENT 2>/dev/null | grep -q "ip daddr $cidr.*tcp-loadbalacer-secondary" || \
                    nft insert rule ip nat KIND-MASQ-AGENT ip daddr "$cidr" return comment "tcp-loadbalacer-secondary"
                done
                sleep 10
              done
          securityContext:
            runAsUser: 0
            privileged: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: tcp-loadbalacer
spec:
  replicas: 1
  selector:
    matchLabels: {app: redis}
  template:
    metadata:
      labels: {app: redis}
    spec:
      containers:
        - name: redis
          image: redis:7.4-alpine
          args: ["redis-server", "--appendonly", "yes"]
          ports:
            - {name: redis, containerPort: 6379}
          readinessProbe:
            exec: {command: ["redis-cli", "ping"]}
            initialDelaySeconds: 2
            periodSeconds: 3
          volumeMounts:
            - {name: data, mountPath: /data}
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: tcp-loadbalacer
spec:
  selector: {app: redis}
  ports:
    - {name: redis, port: 6379, targetPort: redis}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tcp-lb-gateway
  namespace: tcp-loadbalacer
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels: {app: tcp-lb-gateway}
  template:
    metadata:
      labels: {app: tcp-lb-gateway}
      annotations:
        k8s.v1.cni.cncf.io/networks: |-
          [
            {"name":"worker1-net","interface":"worker1","ips":["10.10.0.254/24"]},
            {"name":"worker2-net","interface":"worker2","ips":["10.20.0.254/24"]},
            {"name":"server-net","interface":"server","ips":["10.30.0.254/24"]}
          ]
    spec:
      nodeSelector: {tcp-lb-role: dataplane}
      initContainers:
        - name: enable-ip-forwarding
          image: tcp-loadbalacer/tcp-lb-gateway:latest
          imagePullPolicy: Never
          command: ["sysctl", "-w", "net.ipv4.ip_forward=1"]
          securityContext:
            runAsUser: 0
            privileged: true
      containers:
        - name: gateway
          image: tcp-loadbalacer/tcp-lb-gateway:latest
          imagePullPolicy: Never
          securityContext:
            runAsUser: 0
            capabilities: {add: ["NET_ADMIN"]}
          env:
            - name: PORT_MAPPINGS
              value: 1000-1010=tcp-backend-worker1@10.10.0.0/24,2000-2010=tcp-backend-worker2@10.20.0.0/24
            - {name: SERVER_CIDR, value: 10.30.0.0/24}
            - {name: GATEWAY_SERVER_IP, value: 10.30.0.254}
            - {name: REDIS_ADDR, value: "redis:6379"}
          ports:
            - {name: health, containerPort: 8080}
          readinessProbe:
            httpGet: {path: /healthz, port: health}
            periodSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: tcp-lb-gateway
  namespace: tcp-loadbalacer
spec:
  selector: {app: tcp-lb-gateway}
  ports:
    - {name: health, port: 8080, targetPort: health}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tcp-server-emu
  namespace: tcp-loadbalacer
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels: {app: tcp-server-emu}
  template:
    metadata:
      labels: {app: tcp-server-emu}
      annotations:
        k8s.v1.cni.cncf.io/networks: '[{"name":"server-net","interface":"server","ips":["10.30.0.10/24"]}]'
    spec:
      nodeSelector: {tcp-lb-role: dataplane}
      containers:
        - name: server
          image: tcp-loadbalacer/tcp-server-emu:latest
          imagePullPolicy: Never
          securityContext:
            runAsUser: 0
            capabilities:
              add: ["NET_RAW", "NET_ADMIN"]
          ports:
            - {name: tcp, containerPort: 9000}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tcp-backend-worker1
  namespace: tcp-loadbalacer
spec:
  replicas: 1
  selector:
    matchLabels: {app: tcp-backend-worker1}
  template:
    metadata:
      labels: {app: tcp-backend-worker1}
      annotations:
        k8s.v1.cni.cncf.io/networks: worker1-net
    spec:
      nodeSelector: {tcp-lb-role: dataplane}
      containers:
        - name: worker
          image: tcp-loadbalacer/tcp-backend-worker:latest
          imagePullPolicy: Never
          securityContext:
            runAsUser: 0
            capabilities: {add: ["NET_ADMIN", "NET_BIND_SERVICE"]}
          env:
            - {name: WORKER_NAME, value: tcp-backend-worker1}
            - {name: SOURCE_PORT_RANGE, value: 1000-1010}
            - {name: REMOTE_ADDR, value: "10.30.0.10:9000"}
            - {name: STATIC_ROUTES, value: 10.30.0.0/24=10.10.0.254}
            - {name: REDIS_ADDR, value: "redis:6379"}
          ports:
            - {name: health, containerPort: 8080}
          readinessProbe:
            httpGet: {path: /healthz, port: health}
            periodSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: tcp-backend-worker1
  namespace: tcp-loadbalacer
spec:
  clusterIP: None
  selector: {app: tcp-backend-worker1}
  ports:
    - {name: health, port: 8080, targetPort: health}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tcp-backend-worker2
  namespace: tcp-loadbalacer
spec:
  replicas: 1
  selector:
    matchLabels: {app: tcp-backend-worker2}
  template:
    metadata:
      labels: {app: tcp-backend-worker2}
      annotations:
        k8s.v1.cni.cncf.io/networks: worker2-net
    spec:
      nodeSelector: {tcp-lb-role: dataplane}
      containers:
        - name: worker
          image: tcp-loadbalacer/tcp-backend-worker:latest
          imagePullPolicy: Never
          securityContext:
            runAsUser: 0
            capabilities: {add: ["NET_ADMIN", "NET_BIND_SERVICE"]}
          env:
            - {name: WORKER_NAME, value: tcp-backend-worker2}
            - {name: SOURCE_PORT_RANGE, value: 2000-2010}
            - {name: REMOTE_ADDR, value: "10.30.0.10:9000"}
            - {name: STATIC_ROUTES, value: 10.30.0.0/24=10.20.0.254}
            - {name: REDIS_ADDR, value: "redis:6379"}
          ports:
            - {name: health, containerPort: 8080}
          readinessProbe:
            httpGet: {path: /healthz, port: health}
            periodSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: tcp-backend-worker2
  namespace: tcp-loadbalacer
spec:
  clusterIP: None
  selector: {app: tcp-backend-worker2}
  ports:
    - {name: health, port: 8080, targetPort: health}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pod-state-manager
  namespace: tcp-loadbalacer
spec:
  replicas: 1
  selector:
    matchLabels: {app: pod-state-manager}
  template:
    metadata:
      labels: {app: pod-state-manager}
    spec:
      containers:
        - name: manager
          image: tcp-loadbalacer/pod-state-manager:latest
          imagePullPolicy: Never
          env:
            - {name: REDIS_ADDR, value: "redis:6379"}
            - {name: POLL_INTERVAL, value: 5s}
            - name: MANAGED_SERVICES
              value: tcp-lb-gateway=tcp-lb-gateway:8080,tcp-backend-worker1=tcp-backend-worker1:8080,tcp-backend-worker2=tcp-backend-worker2:8080
